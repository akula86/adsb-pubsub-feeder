# Semantic catalog: the Pub/Sub message this feeder publishes.
#
# One Pub/Sub message is published per complete SBS line read from the feed.
# The message BODY is the raw SBS/BaseStation line (UTF-8 bytes, newline
# stripped). The LOCATION attribute identifies the feeder. Nothing in the line
# is reformatted before publishing; subscribers parse the CSV positionally.

format: SBS-1 BaseStation (a.k.a. SBS, port 30003 format)
origin: >-
  dump1090 / fr24feed decodes Mode S / ADS-B and emits this CSV text protocol on
  TCP port 30003. Developed by Kinetic Avionics for the BaseStation SDR product.
build_note: >-
  This deployment feeds from a FlightRadar24 (fr24feed) build bundling dump1090.
  The port-30003 BaseStation format is a fixed wire protocol shared across all
  dump1090 forks (fr24, FlightAware dump1090-fa, antirez/Malcolm Robb), so the
  22-field layout below applies regardless of fork. This catalog was VALIDATED
  against a live 60-second sample from this Pi (2026-07-15, 6,775 lines): the
  22-column layout, field positions, and per-subtype population all confirmed.
  Notably, session_id/aircraft_id/flight_id are REAL record numbers on this
  build (not hardcoded to 1 as many docs claim), and vertical_rate is ft/min
  (confirmed). Observed subtypes 1,3,4,5,6,8 plus ID/STA/AIR records; no 2
  (surface) or 7 (air-to-air) in that window.
transport: >-
  Read line-by-line from the TCP feed (see src/ads_b/network/read_sbs_lines.py),
  then published one line per Google Cloud Pub/Sub message.

pubsub_message:
  data:
    description: The raw SBS line, UTF-8 encoded, trailing newline/CR stripped.
    encoding: utf-8 bytes
    example: "MSG,3,333,14370,A561FD,14470,2026/07/15,05:47:07.905,2026/07/15,05:47:07.905,,35000,,,36.15436,-120.56093,,,0,0,0,0"
  attributes:
    LOCATION:
      description: >-
        IATA code of the airport nearest the feeder (e.g. SJC), identifying the
        physical source. Set from [pubsub] location in app.toml. Uppercased,
        non-empty, <= 1024 bytes (the Pub/Sub attribute-value limit).
      type: str
      example: SJC

# The message line is a comma-separated record. Field 1 is the record type; for
# a transmission record (MSG) field 2 is the transmission subtype. Fields are
# positional: a field not applicable to the record/subtype is left EMPTY (two
# adjacent commas), not omitted, so every line has the same 22 columns.
record_types:
  MSG: >-
    Transmission message generated by an aircraft. 22 fields. The vast majority
    of traffic (subtypes 3 and 4 dominate).
  STA: >-
    Status change message. Observed on this build (NOT dump1090-silent as some
    docs say). Ends at field 11, which carries a status code (observed "SL").
  ID: >-
    New ID message - aircraft set/changed its callsign. Observed on this build.
    Ends at field 11 (callsign, observed "CMD2").
  AIR: >-
    New aircraft message - first signal from an untracked aircraft. Observed on
    this build. Ends at field 10 (no callsign column).
  SEL: Selection change message - user-selected aircraft. Not seen (BaseStation UI event).
  CLK: Click message - user double-clicked an aircraft. Not seen (BaseStation UI event).

# Non-MSG records share fields 1-10 with MSG (type, blank subtype, session/
# aircraft/flight IDs, hex_ident, and the two date/time pairs) but are TRUNCATED:
# they do not carry the 22-column tail. ID and STA add field 11; AIR stops at 10.
non_msg_field_counts:
  ID: 11    # field 11 = callsign
  STA: 11   # field 11 = status code (e.g. SL, PL, RM, AD - BaseStation status flags)
  AIR: 10   # identification only, no callsign

# MSG subtype (field 2) selects which downstream fields carry data. Each maps to
# a downlink format (DF) / comm-B data selector (BDS) of the Mode S protocol.
msg_subtypes:
  1:
    name: ES Identification and Category
    source: DF17 BDS 0,8
    populates: [Callsign]
  2:
    name: ES Surface Position Message
    source: DF17 BDS 0,6
    populates: [Altitude, GroundSpeed, Track, Latitude, Longitude, IsOnGround]
  3:
    name: ES Airborne Position Message
    source: DF17 BDS 0,5
    populates: [Altitude, Latitude, Longitude, Alert, Emergency, SPI]
  4:
    name: ES Airborne Velocity Message
    source: DF17 BDS 0,9
    populates: [GroundSpeed, Track, VerticalRate]
  5:
    name: Surveillance Altitude Message
    source: DF4, DF20
    populates: [Altitude, Alert, SPI, IsOnGround]
  6:
    name: Surveillance ID Message
    source: DF5, DF21
    populates: [Altitude, Squawk, Alert, Emergency, SPI, IsOnGround]
  7:
    name: Air-to-Air Message
    source: DF16
    populates: [Altitude, IsOnGround]
  8:
    name: All Call Reply
    source: DF11
    populates: [IsOnGround]

# All 22 positional columns, in order. "blank_when" notes when dump1090 leaves a
# column empty; see msg_subtypes for exactly which columns a subtype fills.
fields:
  - position: 1
    name: message_type
    type: str
    description: Record type - one of MSG, STA, ID, AIR, SEL, CLK.
  - position: 2
    name: transmission_type
    type: int
    description: MSG subtype 1-8 (see msg_subtypes). Empty for non-MSG records.
  - position: 3
    name: session_id
    type: int
    description: >-
      BaseStation database session record number. On this fr24feed build it is a
      real per-session value (observed 333), NOT hardcoded to 1. Many stock
      dump1090 forks hardcode it to 1; this build does not.
    example: 333
  - position: 4
    name: aircraft_id
    type: int
    description: >-
      BaseStation aircraft record number. Real incrementing record number on this
      build (observed ~14400+), NOT hardcoded to 1.
    example: 14370
  - position: 5
    name: hex_ident
    type: str (hex)
    description: 24-bit aircraft Mode S / ICAO address, hexadecimal. The stable aircraft key.
    example: "A561FD"
  - position: 6
    name: flight_id
    type: int
    description: >-
      BaseStation flight record number. Real incrementing record number on this
      build (observed ~14400+, tracks aircraft_id + 100), NOT hardcoded to 1.
    example: 14470
  - position: 7
    name: date_generated
    type: date
    format: "YYYY/MM/DD"
    description: Date the aircraft generated the message (receiver clock).
  - position: 8
    name: time_generated
    type: time
    format: "HH:MM:SS.sss"
    description: Time the message was generated, millisecond precision.
  - position: 9
    name: date_logged
    type: date
    format: "YYYY/MM/DD"
    description: Date the receiver logged the message.
  - position: 10
    name: time_logged
    type: time
    format: "HH:MM:SS.sss"
    description: Time the receiver logged the message, millisecond precision.
  - position: 11
    name: callsign
    type: str
    description: Flight ID / registration, up to 8 chars. Populated on subtype 1.
    blank_when: transmission_type != 1
  - position: 12
    name: altitude
    type: int
    unit: feet (Mode C, relative to 1013.25 mb / flight level)
    description: Barometric altitude. Populated on subtypes 2,3,5,6,7.
  - position: 13
    name: ground_speed
    type: float
    unit: knots
    description: Speed over ground. Populated on subtypes 2,4.
  - position: 14
    name: track
    type: float
    unit: degrees
    description: Ground track angle (heading over ground). Populated on subtypes 2,4.
  - position: 15
    name: latitude
    type: float
    unit: decimal degrees
    description: Latitude. Populated on subtypes 2,3.
    example: 34.81609
  - position: 16
    name: longitude
    type: float
    unit: decimal degrees
    description: Longitude. Populated on subtypes 2,3.
    example: 34.07810
  - position: 17
    name: vertical_rate
    type: int
    unit: feet/min
    description: >-
      Climb (positive) or descent (negative) rate. Populated on subtype 4.
      Confirmed ft/min against live feed (observed -1088, a normal descent;
      that magnitude is impossible in ft/s). Some format docs wrongly say ft/s.
    example: -1088
  - position: 18
    name: squawk
    type: str
    description: Mode A transponder squawk code (4 octal digits). Populated on subtype 6.
  - position: 19
    name: alert
    type: flag (0/1)
    description: Squawk code changed since last message (flag).
  - position: 20
    name: emergency
    type: flag (0/1)
    description: Emergency squawk code is set (flag).
  - position: 21
    name: spi
    type: flag (0/1)
    description: Special Purpose Identification / Ident active - transponder ident pressed (flag).
  - position: 22
    name: is_on_ground
    type: flag (0/1)
    description: Ground squat switch active - aircraft reports it is on the ground (flag).

# Real lines captured from this Pi's live feed (2026-07-15, fr24feed build).
examples:
  - line: "MSG,1,333,14441,A305B0,14541,2026/07/15,05:47:08.502,2026/07/15,05:47:08.502,SIS94,,,,,,,,,,,"
    note: Identification - callsign SIS94 (field 11); everything else blank.
  - line: "MSG,3,333,14370,A561FD,14470,2026/07/15,05:47:07.905,2026/07/15,05:47:07.905,,35000,,,36.15436,-120.56093,,,0,0,0,0"
    note: Airborne position - alt 35000 ft, lat 36.15436 / lon -120.56093, flags 0.
  - line: "MSG,4,333,14377,AC287C,14477,2026/07/15,05:47:07.905,2026/07/15,05:47:07.905,,,245.0,315.8,,,-1088,,,,,"
    note: Airborne velocity - ground speed 245.0 kt, track 315.8 deg, vertical rate -1088 ft/min (descending).
  - line: "MSG,5,333,14447,A17ECD,14547,2026/07/15,05:47:08.393,2026/07/15,05:47:08.393,,1075,,,,,,,0,,0,0"
    note: Surveillance altitude - alt 1075 ft, alert flag (19) 0.
  - line: "MSG,6,333,14444,A54AAE,14544,2026/07/15,05:47:08.400,2026/07/15,05:47:08.400,,33000,,,,,,3570,0,0,0,0"
    note: Surveillance ID - alt 33000 ft, squawk (18) 3570, flags 0.
  - line: "MSG,8,333,14447,A17ECD,14547,2026/07/15,05:47:11.288,2026/07/15,05:47:11.288,,,,,,,,,,,,0"
    note: All-call reply - identification only, is_on_ground (22) 0.
  - line: "ID,,333,14446,AB63C2,14546,2026/07/15,05:47:14.463,2026/07/15,05:47:14.463,CMD2"
    note: New ID record (11 fields) - callsign CMD2. Note blank subtype (field 2).
  - line: "STA,,333,14432,C8236E,14532,2026/07/15,05:46:59.718,2026/07/15,05:46:59.718,SL"
    note: Status change record (11 fields) - status code SL in field 11.
  - line: "AIR,,333,14448,A83920,14548,2026/07/15,05:47:37.503,2026/07/15,05:47:37.503"
    note: New aircraft record (10 fields) - identification only, no callsign.

# Observed subtype distribution in the 60s / 6,775-line sample:
observed_distribution:
  "MSG,4": 3029   # airborne velocity
  "MSG,3": 2978   # airborne position
  "MSG,6": 311    # surveillance ID
  "MSG,1": 302    # identification
  "MSG,5": 126    # surveillance altitude
  "MSG,8": 20     # all-call reply
  "ID": 5
  "STA": 2
  "AIR": 2
  # not seen: MSG,2 (surface position), MSG,7 (air-to-air)

sources:
  - "https://github.com/wiseman/node-sbs1/blob/master/README.md"
  - "https://ebctech.eu/dump1090-export/"
  - "https://discussions.flightaware.com/t/dump1090-data-format/41851"
  - "http://woodair.net (SBS-1 BaseStation Tutorial - canonical field reference)"
